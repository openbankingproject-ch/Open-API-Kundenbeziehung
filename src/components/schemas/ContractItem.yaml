type: object
required:
  - contractType
  - contractId
  - version
  - accepted
  - acceptanceTimestamp
properties:
  contractType:
    type: string
    enum: [termsAndConditions, dataSharingAgreement, baseContract, productAgreement]
  contractId:
    type: string
    description: Unique identifier for this contract document instance.
  version:
    type: string
    description: Version number of the contract (e.g. 2.1, 3.0).
  accepted:
    type: boolean
    description: Must be true for all required contracts before proceeding to signature.
  acceptanceTimestamp:
    type: string
    format: date-time
    description: ISO 8601 timestamp of when the customer accepted this contract.
  productId:
    type: string
    description: Product catalog ID this contract applies to (relevant for productAgreement only).
