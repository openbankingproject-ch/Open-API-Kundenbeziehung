<!DOCTYPE html>
<html>
<head>
    <title>Simple API Test</title>
</head>
<body>
    <h1>Simple API Test</h1>
    <button onclick="testPUT()">Test PUT Customer</button>
    <button onclick="testCheck()">Test Check Customer</button>
    <pre id="output"></pre>

    <script>
        const API_BASE = 'http://localhost:3000/v1';
        const HASH = '5363686d6964744d61726961313939302d30352d323043480000000000000000';

        function log(msg) {
            document.getElementById('output').textContent += msg + '\n';
            console.log(msg);
        }

        async function testPUT() {
            try {
                log('Testing PUT /v1/customer/:hash');

                const requestBody = {
                    basicData: {
                        lastName: 'Schmidt',
                        givenName: 'Maria',
                        birthDate: '1990-05-20',
                        nationality: ['CH']
                    }
                };

                log('Making request...');

                const response = await fetch(`${API_BASE}/customer/${HASH}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestBody)
                });

                log(`Response status: ${response.status} ${response.statusText}`);
                log(`Response headers: ${response.headers.get('content-type')}`);

                const text = await response.text();
                log(`Response text: ${text}`);

                try {
                    const json = JSON.parse(text);
                    log(`Parsed JSON: ${JSON.stringify(json, null, 2)}`);
                } catch (e) {
                    log(`JSON parse error: ${e.message}`);
                }

                log('✓ PUT test completed');
            } catch (error) {
                log(`✗ Error: ${error.message}`);
                log(`Error stack: ${error.stack}`);
            }
        }

        async function testCheck() {
            try {
                log('\nTesting POST /v1/customer/check');

                const requestBody = {
                    sharedCustomerHash: HASH,
                    basicData: {
                        lastName: 'Schmidt',
                        givenName: 'Maria',
                        birthDate: '1990-05-20',
                        nationality: ['CH']
                    }
                };

                const response = await fetch(`${API_BASE}/customer/check`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestBody)
                });

                log(`Response status: ${response.status}`);

                const json = await response.json();
                log(`Response: ${JSON.stringify(json, null, 2)}`);

                log('✓ Check test completed');
            } catch (error) {
                log(`✗ Error: ${error.message}`);
            }
        }
    </script>
</body>
</html>
